<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Building Outliner — Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* ── Particle canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Success ripple overlay ── */
    #ripple {
      position: fixed;
      z-index: 10;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        #ffffff   0%,
        #fffde7   8%,
        #fbbf24  20%,
        #f97316  35%,
        #ef4444  50%,
        #9333ea  68%,
        #1e1b4b  84%,
        #0f1117 100%);
      width: 120px;
      height: 120px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
      /* Ripple covers screen in ~1.3 s */
      transition: transform 1.3s cubic-bezier(0.2, 0, 0.6, 1),
                  opacity 0.05s ease;
    }

    #ripple.burst {
      opacity: 1;
      transform: translate(-50%, -50%) scale(50);
    }

    /* ── Login card ── */
    .card {
      position: relative;
      z-index: 2;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,131,255,0.05);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* Step 1: inner content fades out instantly before the shrink */
    .card.shrinking #card-content {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    /* Step 2: card collapses to a single blazing point over 2 s */
    .card.shrinking {
      /* scale(0.005) → 380px × 0.005 ≈ 2px — a single bright point */
      transform: scale(0.005);
      border-radius: 50%;
      /* White-hot core → yellow → orange supernova colours */
      background: radial-gradient(circle, #ffffff 0%, #fffbe6 30%, #fbbf24 65%, #f97316 100%);
      border-color: transparent;
      box-shadow:
        0 0 0px   2px  rgba(255, 255, 255, 1),
        0 0 8px   4px  rgba(255, 251, 200, 0.95),
        0 0 20px  8px  rgba(251, 191,  36, 0.85),
        0 0 45px 18px  rgba(249, 115,  22, 0.65),
        0 0 80px 32px  rgba(220,  38,  38, 0.35);
      transition:
        transform     2s cubic-bezier(0.4, 0, 1, 1),
        border-radius 1.1s cubic-bezier(0.4, 0, 1, 1),
        background    0.5s ease,
        border-color  0.3s ease,
        box-shadow    2s ease-out;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #7c83ff, #6366f1);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: #6b7280;
      margin-top: 1px;
    }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.73rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 9px;
      padding: 11px 14px;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus {
      border-color: #7c83ff;
      box-shadow: 0 0 0 3px rgba(124,131,255,0.12);
    }

    input::placeholder { color: #4b5563; }

    .submit-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: linear-gradient(135deg, #7c83ff, #6366f1);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .submit-btn:hover  { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    #error-msg {
      font-size: 0.8rem;
      color: #f87171;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 7px;
      padding: 8px 12px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="ripple"></div>

  <div class="card" id="card">
    <div id="card-content">
      <div class="logo">
        <div class="logo-icon">⬡</div>
        <div>
          <div class="logo-text">Building Outliner</div>
          <div class="logo-sub">Secure access required</div>
        </div>
      </div>

      <h2>Sign in to continue</h2>

      <form id="login-form" onsubmit="handleLogin(event)" autocomplete="off" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username"
                 maxlength="64" autocomplete="username" spellcheck="false" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password"
                 maxlength="128" autocomplete="current-password" />
        </div>

        <button class="submit-btn" type="submit" id="submit-btn">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <div id="error-msg">Incorrect username or password.</div>
    </div>
  </div>

  <script>
    // ── Auth ──────────────────────────────────────────────────────────────────
    const VALID_USERNAME = 'admin';
    const VALID_PASSWORD = '123';

    if (sessionStorage.getItem('auth') === 'true') {
      window.location.replace('index.html');
    }

    // ── Particle network background ───────────────────────────────────────────
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');

    const PARTICLE_COUNT  = 55;
    const CONNECTION_DIST = 145;
    const SPEED           = 0.35;

    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function randomParticle() {
      const angle = Math.random() * Math.PI * 2;
      return {
        x:     Math.random() * W,
        y:     Math.random() * H,
        vx:    Math.cos(angle) * SPEED * (0.4 + Math.random() * 0.6),
        vy:    Math.sin(angle) * SPEED * (0.4 + Math.random() * 0.6),
        r:     1.5 + Math.random() * 2,
        // Slightly varied hue so not all particles are identical
        hue:   220 + Math.round(Math.random() * 40),
        alpha: 0.4 + Math.random() * 0.5,
      };
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(randomParticle());

    let animating = true;

    function draw() {
      if (!animating) return;
      requestAnimationFrame(draw);

      ctx.clearRect(0, 0, W, H);

      // Move + bounce
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;
      }

      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > CONNECTION_DIST) continue;

          const lineAlpha = (1 - dist / CONNECTION_DIST) * 0.18;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(124,131,255,${lineAlpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      // Draw nodes
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue},80%,72%,${p.alpha})`;
        ctx.fill();
      }
    }

    draw();

    // ── Explosion canvas effect ───────────────────────────────────────────────
    function triggerExplosion() {
      const cx = W / 2, cy = H / 2;

      // Supernova hue palette: white-hot core → yellow → orange → red → violet
      const NOVA_HUES = [0, 20, 35, 50, 280, 300, 60, 15, 0];

      // Burst particles shooting outward in all directions
      const burstParticles = [];
      for (let i = 0; i < 120; i++) {
        const angle = (Math.PI * 2 / 120) * i + (Math.random() - 0.5) * 0.12;
        const speed = 5 + Math.random() * 14;
        // Inner ring = white/yellow, outer = orange/red/violet
        const hue = NOVA_HUES[Math.floor(Math.random() * NOVA_HUES.length)];
        const sat = hue < 10 ? 10 : 90;  // near-white for hue≈0 first burst
        const lit = hue < 10 ? 98 : 65;
        burstParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          decay: 0.010 + Math.random() * 0.014,
          r: 2 + Math.random() * 6,
          hue, sat, lit,
        });
      }

      // Shockwave rings — tinted like a stellar shockwave (white → amber → crimson)
      const rings = [
        { r: 0, speed: 14, maxR: 600, life: 1.0, width: 3,   color: '255,255,220' },
        { r: 0, speed: 9,  maxR: 500, life: 1.0, width: 2.5, color: '251,191, 36' },
        { r: 0, speed: 6,  maxR: 420, life: 1.0, width: 2,   color: '239, 68, 68' },
        { r: 0, speed: 18, maxR: 350, life: 1.0, width: 1.5, color: '167,139,250' },
      ];

      let flash = 1.4; // white-hot initial detonation

      function drawBlast() {
        ctx.clearRect(0, 0, W, H);

        // Central detonation flash — white core blooming outward through yellow
        if (flash > 0) {
          const rad = 200 * (1.4 - flash) + 30;
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
          g.addColorStop(0,   `rgba(255,255,255,${Math.min(1, flash)})`);
          g.addColorStop(0.25,`rgba(255,253,200,${flash * 0.85})`);
          g.addColorStop(0.55,`rgba(251,191, 36,${flash * 0.55})`);
          g.addColorStop(0.8, `rgba(239, 68, 68,${flash * 0.25})`);
          g.addColorStop(1,   `rgba(147,  0,  0, 0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(cx, cy, rad, 0, Math.PI * 2);
          ctx.fill();
          flash -= 0.022;
        }

        // Shockwave rings
        let ringsAlive = false;
        for (const ring of rings) {
          ring.r += ring.speed;
          ring.life = Math.max(0, 1 - ring.r / ring.maxR);
          if (ring.life <= 0) continue;
          ringsAlive = true;
          ctx.beginPath();
          ctx.arc(cx, cy, ring.r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${ring.color},${ring.life * 0.75})`;
          ctx.lineWidth = ring.width;
          ctx.stroke();
        }

        // Burst particles
        let particlesAlive = false;
        for (const p of burstParticles) {
          if (p.life <= 0) continue;
          particlesAlive = true;
          p.x  += p.vx;
          p.y  += p.vy;
          p.vx *= 0.97;
          p.vy *= 0.97;
          p.life -= p.decay;
          const size = Math.max(0.5, p.r * p.life);
          ctx.beginPath();
          ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.life})`;
          ctx.fill();
        }

        if (particlesAlive || ringsAlive || flash > 0) {
          requestAnimationFrame(drawBlast);
        }
      }

      drawBlast();
    }

    // ── Success transition ────────────────────────────────────────────────────
    // Phase 1 (0 – 2000 ms): card content fades, card shrinks into a glowing ball
    // Phase 2 (2000 – 3400 ms): ball explodes — particles + ripple covers screen
    // Phase 3 (3400 ms): navigate
    function triggerSuccessTransition() {
      animating = false; // stop background particle loop

      // Instantly hide text so the card just looks like a shape as it shrinks
      const card = document.getElementById('card');
      card.classList.add('shrinking');

      // After the 2 s shrink completes, trigger the explosion
      setTimeout(() => {
        triggerExplosion();

        // Ripple fires immediately with the explosion
        document.getElementById('ripple').classList.add('burst');

        // Navigate once the 1.4 s explosion has finished
        setTimeout(() => {
          window.location.replace('index.html');
        }, 1400);
      }, 2000);
    }

    // ── Form logic ────────────────────────────────────────────────────────────
    function sanitize(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function setLoading(on) {
      const btn    = document.getElementById('submit-btn');
      const text   = document.getElementById('btn-text');
      const spin   = document.getElementById('btn-spinner');
      btn.disabled = on;
      text.textContent = on ? 'Signing in…' : 'Sign In';
      spin.classList.toggle('hidden', !on);
    }

    function showError() {
      const card = document.getElementById('card');
      const msg  = document.getElementById('error-msg');
      msg.style.display = 'block';
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = sanitize(document.getElementById('username').value.trim());
      const password = sanitize(document.getElementById('password').value);

      setLoading(true);

      setTimeout(() => {
        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
          sessionStorage.setItem('auth', 'true');
          triggerSuccessTransition();
        } else {
          setLoading(false);
          showError();
          document.getElementById('password').value = '';
        }
      }, 400);
    }
  </script>
</body>
</html>
