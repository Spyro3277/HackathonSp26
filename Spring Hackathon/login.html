<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Building Outliner — Login</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }

    /* ── Particle canvas ── */
    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 2;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,131,255,0.05);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
      transition: transform 0.8s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.6s ease,
                  filter 0.6s ease;
    }

    .card.leaving {
      transform: scale(0.92) translateY(-12px);
      opacity: 0;
      filter: blur(8px);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c83ff, #6366f1);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .logo-text { font-size: 1.15rem; font-weight: 700; color: #e2e8f0; letter-spacing: -0.3px; }
    .logo-sub  { font-size: 0.72rem; color: #6b7280; margin-top: 1px; }

    h2 { font-size: 1rem; font-weight: 600; color: #9ca3af; margin-bottom: 24px; }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

    label {
      font-size: 0.73rem; font-weight: 600; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    input {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 9px;
      padding: 11px 14px;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus {
      border-color: #7c83ff;
      box-shadow: 0 0 0 3px rgba(124,131,255,0.12);
    }

    input::placeholder { color: #4b5563; }

    /* ── Button ── */
    .submit-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: linear-gradient(135deg, #7c83ff, #6366f1);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .submit-btn:hover  { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Spinner ── */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-msg {
      font-size: 0.8rem;
      color: #f87171;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 7px;
      padding: 8px 12px;
      margin-top: 12px;
      text-align: center;
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Shake ── */
    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }

    /* ── Success overlay ── */
    .success-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #7c83ff;
      animation: ringExpand 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
      opacity: 0;
    }

    @keyframes ringExpand {
      0%   { transform: scale(0); opacity: 1; }
      50%  { opacity: 0.7; }
      100% { transform: scale(35); opacity: 0; }
    }

    .success-check {
      position: absolute;
      font-size: 2.2rem;
      color: #7c83ff;
      animation: checkPop 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    }

    @keyframes checkPop {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-fade {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: #0f1117;
      opacity: 0;
      animation: fullFade 1s ease 0.8s forwards;
      pointer-events: none;
    }

    @keyframes fullFade {
      to { opacity: 1; }
    }

    /* ── Welcome text ── */
    .welcome-text {
      position: fixed;
      z-index: 55;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      animation: welcomeIn 0.6s ease 0.3s both;
    }

    .welcome-text h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 6px;
    }

    .welcome-text p {
      font-size: 0.85rem;
      color: #6b7280;
    }

    @keyframes welcomeIn {
      from { opacity: 0; transform: translate(-50%, -46%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div id="root"></div>

  <script>
    // ── Redirect if already logged in ──
    if (sessionStorage.getItem('auth') === 'true') {
      window.location.replace('index.html');
    }

    // ── Particle background ──
    (function() {
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');
      const PARTICLE_COUNT = 55;
      const CONNECTION_DIST = 145;
      const SPEED = 0.35;
      let W, H, particles = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function rp() {
        const a = Math.random() * Math.PI * 2;
        return {
          x: Math.random() * W, y: Math.random() * H,
          vx: Math.cos(a) * SPEED * (0.4 + Math.random() * 0.6),
          vy: Math.sin(a) * SPEED * (0.4 + Math.random() * 0.6),
          r: 1.5 + Math.random() * 2,
          hue: 220 + Math.round(Math.random() * 40),
          alpha: 0.4 + Math.random() * 0.5,
        };
      }
      for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(rp());

      let running = true;
      window._stopParticles = () => { running = false; };

      function draw() {
        if (!running) return;
        requestAnimationFrame(draw);
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > W) p.vx *= -1;
          if (p.y < 0 || p.y > H) p.vy *= -1;
        }
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i], b = particles[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > CONNECTION_DIST) continue;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(124,131,255,${(1 - dist / CONNECTION_DIST) * 0.18})`;
            ctx.lineWidth = 1; ctx.stroke();
          }
        }
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue},80%,72%,${p.alpha})`;
          ctx.fill();
        }
      }
      draw();
    })();
  </script>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    const VALID_USERNAME = 'admin';
    const VALID_PASSWORD = '123';

    function LoginApp() {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(false);
      const [shaking, setShaking] = useState(false);
      const [success, setSuccess] = useState(false);
      const cardRef = useRef(null);

      const handleSubmit = useCallback((e) => {
        e.preventDefault();
        setError(false);
        setLoading(true);

        setTimeout(() => {
          if (username.trim() === VALID_USERNAME && password === VALID_PASSWORD) {
            sessionStorage.setItem('auth', 'true');
            setSuccess(true);
            window._stopParticles();

            // Navigate after transition
            setTimeout(() => {
              window.location.replace('index.html');
            }, 2000);
          } else {
            setLoading(false);
            setError(true);
            setShaking(true);
            setPassword('');
            setTimeout(() => setShaking(false), 400);
          }
        }, 400);
      }, [username, password]);

      if (success) {
        return (
          <>
            {/* Check + ring animation */}
            <div className="success-overlay">
              <div className="success-ring" />
              <div className="success-check">&#x2713;</div>
            </div>

            {/* Welcome message */}
            <div className="welcome-text">
              <h1>Welcome back</h1>
              <p>Loading Building Outliner...</p>
            </div>

            {/* Full-screen fade to match app background */}
            <div className="success-fade" />
          </>
        );
      }

      return (
        <div className={`card ${shaking ? 'shake' : ''}`} ref={cardRef}>
          <div className="logo">
            <div className="logo-icon">&#x2B21;</div>
            <div>
              <div className="logo-text">Building Outliner</div>
              <div className="logo-sub">Secure access required</div>
            </div>
          </div>

          <h2>Sign in to continue</h2>

          <form onSubmit={handleSubmit} autoComplete="off">
            <div className="field">
              <label htmlFor="username">Username</label>
              <input
                type="text"
                id="username"
                placeholder="Enter username"
                maxLength={64}
                autoComplete="username"
                spellCheck={false}
                value={username}
                onChange={(e) => setUsername(e.target.value)}
                disabled={loading}
                autoFocus
              />
            </div>

            <div className="field">
              <label htmlFor="password">Password</label>
              <input
                type="password"
                id="password"
                placeholder="Enter password"
                maxLength={128}
                autoComplete="current-password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                disabled={loading}
              />
            </div>

            <button className="submit-btn" type="submit" disabled={loading}>
              {loading ? (
                <>Signing in... <span className="spinner" /></>
              ) : (
                'Sign In'
              )}
            </button>
          </form>

          {error && (
            <div className="error-msg">
              Incorrect username or password.
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginApp />);
  </script>
</body>
</html>
